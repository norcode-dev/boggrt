boggrt.endpoints-folder-path=${BOGGRT_SOURCE:./src/main/resources}
boggrt.openapi-folder-path=${BOGGRT_OPENAPI_SOURCE:./src/test/resources/openapi-empty}

# Mock server: allow cross-origin requests from any domain.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=*
