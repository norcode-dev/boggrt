openapi: 3.0.3
info:
  title: Petstore
  version: 1.0.0
paths:
  /pets:
    get:
      summary: List pets
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      summary: Create a pet
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets/{petId}:
    get:
      summary: Get a pet by id
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Found pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /owners/{ownerId}/pets/{petId}/notes:
    get:
      summary: Notes about a pet (deep path)
      responses:
        '200':
          description: Notes
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    type: string
                    example: "fixed-example-value"
  /admin/ping:
    get:
      summary: Status check with a default value
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    default: "ok"
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 100
        name:
          type: string
        email:
          type: string
          format: email
        registeredAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [available, pending, sold]
      example:
        id: 42
        name: "Fido-the-example-pet"
        email: fido@example.com
        registeredAt: '2026-01-01T00:00:00Z'
        status: available
