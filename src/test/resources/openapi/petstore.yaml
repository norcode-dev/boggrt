openapi: 3.0.3
info:
  title: Petstore
  version: 1.0.0
paths:
  /pets:
    get:
      summary: List pets
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      summary: Create a pet
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /featured-pets:
    get:
      summary: Featured pets with an explicit multi-element array example
      responses:
        '200':
          description: A curated list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
                example:
                  - id: 7
                    name: "Rex-the-featured-pet"
                    status: available
                  - id: 8
                    name: "Bella-the-featured-pet"
                    status: pending
                  - id: 9
                    name: "Max-the-featured-pet"
                    status: sold
  /paged-pets:
    get:
      summary: A paged list whose media-type example lists several pets verbatim
      responses:
        '200':
          description: A page of pets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Pet'
              example:
                data:
                  - id: 1
                    name: "Alpha-pet"
                    status: available
                  - id: 2
                    name: "Beta-pet"
                    status: pending
                  - id: 3
                    name: "Gamma-pet"
                    status: sold
                pagination:
                  page: 1
                  pageSize: 25
                  totalItems: 3
                  totalPages: 1
  /pets/{petId}:
    get:
      summary: Get a pet by id
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Found pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /owners/{ownerId}/pets/{petId}/notes:
    get:
      summary: Notes about a pet (deep path)
      responses:
        '200':
          description: Notes
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    type: string
                    example: "fixed-example-value"
  /admin/ping:
    get:
      summary: Status check with a default value
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    default: "ok"
components:
  schemas:
    Page:
      type: object
      properties:
        data:
          type: array
          items: {}
        pagination:
          type: object
          properties:
            page:
              type: integer
            pageSize:
              type: integer
            totalItems:
              type: integer
            totalPages:
              type: integer
      example:
        data: []
        pagination:
          page: 1
          pageSize: 25
          totalItems: 137
          totalPages: 6
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          maximum: 100
        name:
          type: string
        email:
          type: string
          format: email
        registeredAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [available, pending, sold]
      example:
        id: 42
        name: "Fido-the-example-pet"
        email: fido@example.com
        registeredAt: '2026-01-01T00:00:00Z'
        status: available
