boggrt.endpoints-folder-path=${BOGGRT_SOURCE:/resources}
boggrt.openapi-folder-path=${BOGGRT_OPENAPI_SOURCE:/openapi}

# Mock server: allow cross-origin requests from any domain.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=*

# Defer AWT/java2d class init to run time so native-image analysis doesn't try to
# run sun.java2d.pipe.Region.initIDs() (a native method unavailable at build time).
quarkus.native.additional-build-args=--initialize-at-run-time=sun.java2d.pipe.Region\\,net.datafaker
